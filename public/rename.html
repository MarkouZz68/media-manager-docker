<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Renommer Media</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root { --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; --primary: #3498db; --success: #2ecc71; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .nav { margin-bottom: 20px; }
        .nav a { color: var(--primary); text-decoration: none; font-weight: bold; }
        .section { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        h2 { border-bottom: 1px solid #444; padding-bottom: 10px; }
        .media-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #333; }
        input { background: #444; border: 1px solid #555; color: white; padding: 8px; border-radius: 4px; flex: 1; }
        button { background: var(--success); border: none; padding: 8px 15px; color: white; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">⬅ Retour au tri</a>
</div>

<h1>✏️ Renommer vos Médias</h1>

<div class="section">
    <h2>🎬 Films</h2>
    <div id="list-films"></div>
</div>

<div class="section">
    <h2>📺 Séries</h2>
    <div id="list-series"></div>
</div>

<script>
    async function loadMedia() {
        const res = await fetch('/api/media');
        const data = await res.json();
        
        const render = (items, containerId, type) => {
            const container = document.getElementById(containerId);
            container.innerHTML = items.length ? "" : "Aucun fichier.";
            items.forEach(item => {
                const div = document.createElement("div");
                div.className = "media-item";
                div.innerHTML = `
                    <input type="text" value="${item}" id="input-${btoa(item)}">
                    <button onclick="rename('${item}', '${type}')">OK</button>
                `;
                container.appendChild(div);
            });
        };

        render(data.films, "list-films", "films");
        render(data.series, "list-series", "series");
    }

    async function rename(oldName, type) {
        const newName = document.getElementById(`input-${btoa(oldName)}`).value;
        if (oldName === newName) return;

        const res = await fetch('/api/rename-action', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ oldName, newName, type })
        });

        if (res.ok) {
            alert("Renommé avec succès !");
            loadMedia();
        } else {
            alert("Erreur lors du renommage");
        }
    }

    loadMedia();
</script>
</body>
</html>
