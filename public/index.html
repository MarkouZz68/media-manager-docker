<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Manager</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #eeeeee;
            --primary: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: var(--primary); }
        
        .section { background: var(--card); padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        ul { list-style: none; padding: 0; }
        li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            border-bottom: 1px solid #444; 
            transition: background 0.2s;
        }
        li:hover { background: #383838; }
        
        .file-info { display: flex; align-items: center; gap: 10px; font-weight: 500; flex: 1; }
        .actions { display: flex; gap: 10px; }
        
        button { 
            border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; 
            font-weight: bold; transition: opacity 0.2s; color: white;
        }
        button:hover { opacity: 0.8; }
        .btn-move-series { background: var(--primary); }
        .btn-move-films { background: var(--success); }
        .btn-delete { background: var(--danger); }
        
        input[type="text"] {
            background: #444; border: 1px solid #555; color: white;
            padding: 5px; border-radius: 4px; width: 120px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 Media Manager <button onclick="loadData()" style="background:none; font-size: 0.5em; vertical-align: middle;">🔄</button></h1>

    <div class="section">
        <h2>📥 Torrents à traiter</h2>
        <ul id="torrents-list">
            </ul>
    </div>
</div>

<script>
    // Chargement initial
    async function loadData() {
        try {
            const response = await fetch('/api/data');
            const data = await response.json();
            const list = document.getElementById("torrents-list");
            list.innerHTML = "";

            if (data.torrents.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#888;'>Aucun fichier à traiter.</p>";
                return;
            }

            data.torrents.forEach(file => {
                const li = document.createElement("li");
                
                // Logique d'icône : dossier si pas d'extension pointée à la fin
                const isFile = file.includes('.');
                const icon = isFile ? "🎬" : "📂";

                li.innerHTML = `
                    <div class="file-info">
                        <span>${icon}</span>
                        <span>${file}</span>
                    </div>
                    <div class="actions">
                        <input type="text" id="folder-${btoa(file)}" placeholder="Nom de la série...">
                        <button class="btn-move-series" onclick="move('${file}', 'series')">Série</button>
                        <button class="btn-move-films" onclick="move('${file}', 'films')">Film</button>
                        <button class="btn-delete" onclick="remove('${file}')">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });
        } catch (err) {
            console.error("Erreur chargement:", err);
        }
    }

    async function move(file, type) {
        const destFolder = document.getElementById(`folder-${btoa(file)}`).value;
        if (type === 'series' && !destFolder) {
            alert("Veuillez entrer un nom de dossier pour la série.");
            return;
        }

        const res = await fetch('/move', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file, type, destFolder })
        });

        if (res.ok) loadData();
        else alert("Erreur lors du déplacement");
    }

    async function remove(file) {
        if (!confirm(`Supprimer définitivement ${file} ?`)) return;

        const res = await fetch('/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file })
        });

        if (res.ok) loadData();
        else alert("Erreur lors de la suppression");
    }

    // Lancer au démarrage
    loadData();
    // Rafraîchir les données toutes les 30 secondes (30000 millisecondes)
setInterval(loadData, 30000);
</script>

</body>
</html>
